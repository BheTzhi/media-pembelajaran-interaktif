<!doctype html>
<html>
<head>
  <meta charset="UTF-8" />
  <meta name="authoring-tool" content="Adobe_Animate_CC" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
  <title>Al Istima' App</title>
  <style>
    html,
    body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      background-color: black;
      overflow: hidden;
    }
    #wrapper {
      display: flex;
      justify-content: center;
      align-items: center;
      width: 100vw;
      height: 100vh;
      background-color: black;
    }
    #dom_overlay_container {
      pointer-events: none;
    }
    #animation_container {
      position: relative;
      width: 1280px;
      height: 720px;
      background-color: white;
      touch-action: none;
    }
    canvas {
      display: block;
      background-color: white;
      touch-action: none;
      -ms-touch-action: none;
    }
    /* Styling form siswa */
    #formSiswa {
      position: absolute;
      width: 700px;
      font-family:
        "Traditional Arabic", "Scheherazade New", "Amiri", Arial, sans-serif;
      color: #000;
      background: transparent;
      display: none;
      /* awalnya disembunyikan, nanti show/hide dari Animate */
      z-index: 1000;
    }
    #formSiswa .form-group {
      margin-bottom: 5px;
    }
    #formSiswa label {
      display: block;
      font-weight: bold;
      margin-bottom: 2px;
      font-size: 20px;
    }
    #formSiswa input[type="text"] {
      width: 100%;
      height: 34px;
      font-size: 24px;
      padding: 8px;
      font-weight: bold;
      border: 1px solid #ccc;
      border-radius: 4px;
      box-sizing: border-box;
      color: #000;
    }
    #searchBox {
      position: absolute;
      display: none;
      align-items: center;
      width: 320px;
      /* langsung lebar tetap */
      height: 45px;
      background: #fff;
      border-radius: 25px;
      border: 2px solid #ddd;
      padding: 0 12px;
      box-sizing: border-box;
      z-index: 1000;
    }
    /* icon */
    #searchBox .searchIcon {
      font-size: 18px;
      color: #888;
      min-width: 20px;
    }
    /* input */
    #searchBox input {
      border: none;
      outline: none;
      width: 100%;
      margin-left: 8px;
      font-size: 15px;
      font-weight: bold;
      background: transparent;
    }
    #searchSuggest {
      position: absolute;
      width: 320px;
      max-height: 220px;
      overflow-y: auto;
      background: rgba(255, 255, 255, 0.95);
      border-radius: 12px;
      margin-top: 6px;
      box-shadow: 0 4px 10px rgba(0, 0, 0, 0.2);
      z-index: 1000;
      display: none;
    }
    .suggest-item {
      padding: 10px 14px;
      cursor: pointer;
      font-weight: bold;
    }
    .suggest-item:hover {
      background: #f1f1f1;
    }
  </style>
  <!-- pakai lokal kalau untuk APK -->
  <script src="js/createjs.min.js"></script>
  <script src="index.js"></script>
  <script>
    var canvas,
      stage,
      exportRoot,
      anim_container,
      dom_overlay_container,
      fnStartAnimation;
    // input disini settignya
    var inputRect = {
      x: 480,
      y: 500,
      w: 700,
      h: 45,
    };
    var searchRect = {
      x: 800,
      y: 130,
      w: 400,
      h: 50
    };
    function init() {
      canvas = document.getElementById("canvas");
      anim_container = document.getElementById("animation_container");
      dom_overlay_container = document.getElementById(
        "dom_overlay_container",
      );
      // ⬇️ AMBIL INPUT DI SINI
      domInput = document.getElementById("isianInput");
      domFormSiswa = document.getElementById("formSiswa");
      domSearchBox = document.getElementById("searchBox");
      domSuggest = document.getElementById("searchSuggest");
      inputNip = document.getElementById("inputNip");
      inputCari = document.getElementById("inputCari");
      var comp = AdobeAn.getComposition("068A7D7ED7551241A48EAE0CCAF9F5AF");
      var lib = comp.getLibrary();
      var loader = new createjs.LoadQueue(false);
      loader.addEventListener("fileload", function (evt) {
        handleFileLoad(evt, comp);
      });
      loader.addEventListener("complete", function (evt) {
        handleComplete(evt, comp);
      });
      loader.loadManifest(lib.properties.manifest);
    }
    function handleFileLoad(evt, comp) {
      var images = comp.getImages();
      if (evt && evt.item.type === "image") {
        images[evt.item.id] = evt.result;
      }
    }
    function handleComplete(evt, comp) {
      var lib = comp.getLibrary();
      var ss = comp.getSpriteSheet();
      var queue = evt.target;
      for (var i = 0; i < lib.ssMetadata.length; i++) {
        ss[lib.ssMetadata[i].name] = new createjs.SpriteSheet({
          images: [queue.getResult(lib.ssMetadata[i].name)],
          frames: lib.ssMetadata[i].frames,
        });
      }
      exportRoot = new lib.index();
      stage = new lib.Stage(canvas);
      fnStartAnimation = function () {
        stage.addChild(exportRoot);
        createjs.Ticker.framerate = lib.properties.fps;
        createjs.Ticker.addEventListener("tick", stage);
      };
      // RESPONSIVE AKTIF (seperti file 1)
      AdobeAn.makeResponsive(true, "both", true, 1, [
        canvas,
        anim_container,
        dom_overlay_container,
      ]);
      AdobeAn.compositionLoaded(lib.properties.id);
      fnStartAnimation();
      window.addEventListener("resize", () => {
        updateInputPosition();
        updateFormSiswaPosition();
        updateSearchPosition();
      });
      setTimeout(() => {
        updateInputPosition();
        updateFormSiswaPosition();
        updateSearchPosition();
      }, 50);
      inputCari.addEventListener("input", async function () {
        const keyword = this.value.trim();
        if (!keyword) {
          domSuggest.style.display = "none";
          return;
        }
        const hasil = await Leaderboard.filter(keyword);
        tampilkanSuggest(hasil.slice(0, 5));
      });
      document.addEventListener("click", function (e) {
        if (!domSearchBox.contains(e.target) &&
          !domSuggest.contains(e.target)) {
          domSuggest.style.display = "none";
        }
      });
    }
    function tampilkanSuggest(data) {
      if (!data.length) {
        domSuggest.style.display = "none";
        return;
      }
      domSuggest.innerHTML = "";
      data.forEach(item => {
        const div = document.createElement("div");
        div.className = "suggest-item";
        div.textContent =
          `${item.nisn || "-"} - ${item.nama || "Tanpa Nama"}`;
        div.onclick = () => {
          const keyword = inputCari.value.trim();
          const isAngka = /^\d+$/.test(keyword);
          if (isAngka) {
            inputCari.value = item.nisn || "";
          } else {
            inputCari.value = item.nama || "";
          }
          domSuggest.style.display = "none";
        };
        domSuggest.appendChild(div);
      });
      domSuggest.style.display = "block";
    }
    function updateInputPosition() {
      if (!canvas || !domInput) return;
      // ukuran canvas setelah diskalakan
      const scaleX = canvas.clientWidth / 1280;
      const scaleY = canvas.clientHeight / 720;
      domInput.style.left = inputRect.x * scaleX + "px";
      domInput.style.top = inputRect.y * scaleY + "px";
      domInput.style.width = inputRect.w * scaleX + "px";
      domInput.style.height = inputRect.h * scaleY + "px";
      domInput.style.fontSize = 45 * scaleY + "px";
    }
    // Form siswa dengan posisi tengah dan agak ke atas 150px
    function updateFormSiswaPosition() {
      if (!canvas || !domFormSiswa) return;
      const scaleX = canvas.clientWidth / 1280;
      const scaleY = canvas.clientHeight / 720;
      // Ukuran form sesuai desain, lebar tetap 700 px (scaled)
      const formWidth = 700 * scaleX;
      // Hitung total tinggi form, tinggi input 60 px sudah termasuk margin
      const totalFormHeight = 60 * 3 + 15 * 2; // 3 input, margin bawah antar input
      // Scale tinggi form
      const scaledFormHeight = totalFormHeight * scaleY;
      // Ukuran container vertikal (waktu kecil) yang harus diikuti (contoh 360px)
      const containerHeight = 360 * scaleY;
      // Posisi kiri tetap di tengah canvas (sesuai skala)
      const leftPos = ((1280 - 700) / 2) * scaleX;
      // Posisi atas: normalnya di tengah canvas dikurangi offset 150px (atau sesuaikan)
      let topPos = ((720 - totalFormHeight) / 2 - 50) * scaleY;
      // Jika form tinggi melebihi container height, paksa posisi top supaya pas di container
      if (scaledFormHeight > containerHeight) {
        topPos = (containerHeight - scaledFormHeight) / 2;
      }
      // Jika posisi top kurang dari 0, koreksi agar tidak keluar layar atas
      if (topPos < 0) topPos = 0;
      // Set style
      domFormSiswa.style.width = formWidth + "px";
      domFormSiswa.style.left = leftPos + "px";
      domFormSiswa.style.top = topPos + "px";
    }
    function updateSearchPosition() {
      if (!canvas || !domSearchBox) return;
      const scaleX = canvas.clientWidth / 1280;
      const scaleY = canvas.clientHeight / 720;
      domSearchBox.style.left = searchRect.x * scaleX + "px";
      domSearchBox.style.top = searchRect.y * scaleY + "px";
      domSearchBox.style.width = searchRect.w * scaleX + "px";
      domSearchBox.style.height = searchRect.h * scaleY + "px";
      domSuggest.style.left = domSearchBox.style.left;
      domSuggest.style.top = (searchRect.y * scaleY + searchRect.h * scaleY + 5) + "px";
      domSuggest.style.width = domSearchBox.style.width;
    }    
  </script>
</head>
<body onload="init()">
  <div id="wrapper">
    <div id="animation_container">
      <canvas id="canvas" width="1280" height="720"></canvas>
      <div id="dom_overlay_container"></div>
      <!-- Form disini -->
      <div id="formSiswa">
        <div class="form-group">
          <label for="inputNip">NISN</label>
          <input id="inputNip" type="text" placeholder="Ketik NISN" maxlength="10" />
        </div>
      </div>
      <!-- end form -->
      <!-- INPUT ISIAN -->
      <input id="isianInput" type="text" placeholder="...Ketik jawaban di sini" dir="rtl" lang="ar" maxlength="18"
        style="
            position: absolute;
            left: 0;
            top: 0;
            font-family:
              &quot;Traditional Arabic&quot;, &quot;Scheherazade New&quot;,
              &quot;Amiri&quot;, &quot;Arial&quot;, sans-serif;
            font-size: 45px;
            font-weight: bold;
            padding: 8px;
            background: transparent;
            border: none;
            outline: none;
            box-shadow: none;
            color: #000;
            text-align: right;
            caret-color: #000;
            display: none;
            z-index: 1000;
          " />
      <!-- END INPUT ISIAN -->
      <!-- SEARCH BOX -->
      <div id="searchBox">
        <span class="searchIcon">🔍</span>
        <input id="inputCari" type="text" placeholder="Cari NISN / Nama" maxlength="20" />
      </div>
      <div id="searchSuggest"></div>
      <!-- END SEARCH  -->
    </div>
  </div>
  <!-- BACK BUTTON ANDROID -->
  <script>
    document.addEventListener("deviceready", function () {
      let backPressedOnce = false;
      document.addEventListener(
        "backbutton",
        function (e) {
          e.preventDefault();
          if (backPressedOnce) {
            navigator.app.exitApp();
          } else {
            backPressedOnce = true;
            if (window.plugins && window.plugins.toast) {
              window.plugins.toast.showShortBottom(
                "Tekan sekali lagi untuk keluar",
              );
            } else {
              alert("Tekan sekali lagi untuk keluar");
            }
            setTimeout(() => (backPressedOnce = false), 2000);
          }
        },
        false,
      );
    });
  </script>
  <script>
    (function () {
      const input = document.getElementById("isianInput");
      if (!input) return;
      const arabicRegex = /[\u0600-\u06FF\u0750-\u077F\u08A0-\u08FF\s]/;
      input.addEventListener("keypress", function (e) {
        const char = String.fromCharCode(e.which);
        if (!arabicRegex.test(char)) {
          e.preventDefault();
        }
      });
      input.addEventListener("input", function () {
        let filtered = "";
        for (let char of this.value) {
          if (arabicRegex.test(char)) {
            filtered += char;
          }
        }
        if (this.value !== filtered) {
          this.value = filtered;
        }
      });
      input.setAttribute("inputmode", "text");
    })();
  </script>
  <script type="module">
    import { initializeApp }
      from "https://www.gstatic.com/firebasejs/12.9.0/firebase-app.js";
    import {
      getFirestore,
      collection,
      doc,
      setDoc,
      updateDoc,
      getDocs,
      getDoc,
      deleteDoc,
      deleteField,
      serverTimestamp,
      query,
      orderBy
    } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-firestore.js";
    /* ================= CONFIG ================= */
    const firebaseConfig = {
      apiKey: "AIzaSyA0FnGh296zb9BIBHRwZTQKUIjbM4f_tOg",
      authDomain: "animate-talimularobiah.firebaseapp.com",
      projectId: "animate-talimularobiah",
      storageBucket: "animate-talimularobiah.firebasestorage.app",
      messagingSenderId: "145925511349",
      appId: "1:145925511349:web:14f7018f2e79ef076f86fc"
    };
    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const colRef = collection(db, "leaderboard");
    /* ================= DEFAULT QUIZ OBJECT ================= */
    const defaultQuiz = {
      nilai: 0,
      benar: 0,
      salah: 0
    };
    function ambilNilai(q) {
      if (typeof q === "number") return q;
      return q?.nilai || 0;
    }
    /* ================= MODULE ================= */
    window.Leaderboard = {
      /* ================= MIGRASI ================= */
      async migrateFromNipToNisn(nisn) {
        const newRef = doc(db, "leaderboard", nisn);
        const newSnap = await getDoc(newRef);
        if (newSnap.exists()) return;
        const snapshot = await getDocs(colRef);
        for (const d of snapshot.docs) {
          const data = d.data();
          if (data.nip && data.nip === nisn) {
            const total_quiz =
              ambilNilai(data.quiz1) +
              ambilNilai(data.quiz2) +
              ambilNilai(data.quiz3);
            await setDoc(newRef, {
              nama: data.nama || "",
              kelas: data.kelas || "",
              nisn,
              quiz1: data.quiz1 || defaultQuiz,
              quiz2: data.quiz2 || defaultQuiz,
              quiz3: data.quiz3 || defaultQuiz,
              total_quiz,
              total_keseluruhan: total_quiz,
              created_at: data.created_at || serverTimestamp(),
              updated_at: serverTimestamp()
            });
            await deleteDoc(doc(db, "leaderboard", d.id));
            return;
          }
        }
      },
      /* ================= LOGIN ================= */
      async login(nisn) {
        await this.migrateFromNipToNisn(nisn);
        const ref = doc(db, "leaderboard", nisn);
        const snap = await getDoc(ref);
        if (!snap.exists()) {
          await setDoc(ref, {
            nisn,
            quiz1: defaultQuiz,
            quiz2: defaultQuiz,
            quiz3: defaultQuiz,
            total_quiz: 0,
            total_keseluruhan: 0,
            created_at: serverTimestamp(),
            updated_at: serverTimestamp()
          });
          console.log("Siswa baru dibuat");
        } else {
          const d = snap.data();
          const total_quiz =
            ambilNilai(d.quiz1) +
            ambilNilai(d.quiz2) +
            ambilNilai(d.quiz3);
          await updateDoc(ref, {
            quiz1: d.quiz1 || defaultQuiz,
            quiz2: d.quiz2 || defaultQuiz,
            quiz3: d.quiz3 || defaultQuiz,
            total_quiz,
            total_keseluruhan: total_quiz,
            latihan1: deleteField(),
            latihan2: deleteField(),
            latihan3: deleteField(),
            total_latihan: deleteField(),
            updated_at: serverTimestamp()
          });
          console.log("Login ulang → data dirapikan");
        }
      },
      /* ================= UPDATE NILAI QUIZ ================= */
      async updateNilai(nisn, dataBaru) {
        const ref = doc(db, "leaderboard", nisn);
        const snap = await getDoc(ref);
        if (!snap.exists()) return;
        const lama = snap.data();
        const gabungan = { ...lama, ...dataBaru };
        const total_quiz =
          ambilNilai(gabungan.quiz1) +
          ambilNilai(gabungan.quiz2) +
          ambilNilai(gabungan.quiz3);
        await updateDoc(ref, {
          ...dataBaru,
          total_quiz,
          total_keseluruhan: total_quiz,
          updated_at: serverTimestamp()
        });
        console.log("Nilai quiz diperbarui");
      },
      /* ================= SISANYA TIDAK BERUBAH ================= */
      async getOne(nisn) {
        const snap = await getDoc(doc(db, "leaderboard", nisn));
        return snap.exists() ? { id: snap.id, ...snap.data() } : null;
      },
      async getAll() {
        const snapshot = await getDocs(colRef);
        return snapshot.docs.map(d => ({ id: d.id, ...d.data() }));
      },
      async update(nisn, data) {
        await updateDoc(doc(db, "leaderboard", nisn), {
          ...data,
          updated_at: serverTimestamp()
        });
      },
      async delete(nisn) {
        await deleteDoc(doc(db, "leaderboard", nisn));
      },
      async getRanking() {
        const q = query(colRef, orderBy("nama", "asc"));
        const snapshot = await getDocs(q);
        return snapshot.docs.map(d => ({
          id: d.id,
          ...d.data()
        }));
      },
      async filter(keyword) {
        const semuaData = await this.getAll();
        if (!keyword) return semuaData;
        const key = keyword.toLowerCase();
        return semuaData.filter(d => {
          const nip = (d.nip || "").toLowerCase();
          const nisn = (d.nisn || "").toLowerCase();
          const nama = (d.nama || "").toLowerCase();
          return nip.includes(key) || nisn.includes(key) || nama.includes(key);
        });
      },
    };
    console.log("🔥 Leaderboard FINAL SIAP");
  </script>
</body>
</html>
